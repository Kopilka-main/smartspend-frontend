services:
  frontend:
    image: smartspend-frontend:latest
    container_name: smartspend-frontend
    env_file: ".env"
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    ports:
      - "${APP_PORT:?error}:3000"
    environment:
      - HOST=0.0.0.0
      - NODE_ENV=development
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  frontend_node_modules:
