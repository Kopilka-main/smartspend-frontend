services:
  frontend:
    image: smartspend-frontend:latest
    container_name: smartspend-frontend
    env_file: '.env'
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    ports:
      - '${APP_PORT:?error}:3000'
    environment:
      - HOST=0.0.0.0
      - NODE_ENV=development
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- --timeout=3 http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1'
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

volumes:
  frontend_node_modules:
